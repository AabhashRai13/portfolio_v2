<!DOCTYPE html>
<html lang="en">

<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Aabhash's personal portfolio website.">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#FFF1E6">

    <!-- Favicon for Web -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <title>Say Hi to Aabhash</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background:
                radial-gradient(circle at top, rgba(230, 164, 164, 0.14), transparent 42%),
                linear-gradient(180deg, #FFF8F1 0%, #FFF1E6 55%, #FFFFFF 100%);
            color: #5C4033;
            font-family: 'Poppins', Arial, sans-serif;
        }

        .splash-container {
            position: fixed;
            width: 100%;
            height: 100vh;
            background:
                radial-gradient(circle at top, rgba(230, 164, 164, 0.14), transparent 42%),
                linear-gradient(180deg, #FFF8F1 0%, #FFF1E6 55%, #FFFFFF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease-in-out;
        }

        .lottie-container {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.78);
            border-radius: 32px;
            border: 1px solid rgba(191, 161, 129, 0.18);
            box-shadow:
                0 24px 44px 0 rgba(92, 64, 51, 0.08),
                0 8px 18px 0 rgba(230, 164, 164, 0.18);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading-text {
            font-size: 18px;
            font-weight: bold;
            color: #6B4F3A;
            margin-top: 16px;
            font-family: 'Poppins', Arial, sans-serif;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.7.10/lottie.min.js"></script>
    <script type="module" src="/assets/packages/flutter_3d_controller/assets/model_viewer.min.js" defer></script>

</head>

<body>
    <div class="splash-container" id="splash">
        <div class="lottie-container" id="lottie"></div>
        <p class="loading-text" id="welcome-message">Loading...</p>
    </div>
    <div class="loading-container" id="loading" style="display: none;">
        <div class="spinner"></div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p class="loading-text">Loading, please wait...</p>
    </div>
    <script>
        window.onload = function () {
            const lottiePath = new URL(
                'assets/assets/lottie/laptop_animation.json',
                document.baseURI,
            ).toString();

            // Fetch the JSON data
            fetch(lottiePath)
                .then(response => response.json())
                .then(data => {
                    // Load the Lottie animation
                    const animationContainer = document.getElementById('lottie');
                    lottie.loadAnimation({
                        container: animationContainer, // the DOM element to contain the animation
                        renderer: 'svg',
                        loop: true,
                        autoplay: true,
                        path: data.animationUrl || lottiePath // Path to the Lottie JSON animation
                    });

                    // Set the welcome message
                    const messageElement = document.getElementById('welcome-message');
                    messageElement.textContent = data.message || 'Warming up the portfolio and polishing the pixels...'; // Fallback message if not available

                    // Show splash screen for 2 seconds, then transition to loading
                    setTimeout(() => {
                        document.getElementById("splash").classList.add("fade-out");
                        setTimeout(() => {
                            document.getElementById("splash").style.display = "none";
                            document.getElementById("loading").style.display = "block";
                        }, 1000); // Fade out duration
                    }, 2000); // Show splash screen for 2 seconds
                })
                .catch(error => {
                    console.error('Error loading JSON file:', error);
                    // Fallback to default content if there's an error
                    const animationContainer = document.getElementById('lottie');
                    lottie.loadAnimation({
                        container: animationContainer,
                        renderer: 'svg',
                        loop: true,
                        autoplay: true,
                        path: lottiePath
                    });

                    document.getElementById('welcome-message').textContent =
                        'Getting everything ready for you...';
                    // Proceed with splash fade out
                    setTimeout(() => {
                        document.getElementById("splash").classList.add("fade-out");
                        setTimeout(() => {
                            document.getElementById("splash").style.display = "none";
                            document.getElementById("loading").style.display = "block";
                        }, 1000); // Fade out duration
                    }, 2000); // Show splash screen for 2 seconds
                });
        };
    </script>
    <script src="flutter_bootstrap.js" async></script>
</body>

</html>
