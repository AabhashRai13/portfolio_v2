name: Flutter Web CI/CD Deploy to Hostinger

on:
  push:
    branches:
      - flutter_recommend_architecture

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.4
          channel: stable
          cache: true

      - name: Create keys.dart
        run: |
          mkdir -p lib
          echo "const String emailJsServiceId = '${{ secrets.EMAILJS_SERVICE_ID }}';" > lib/keys.dart
          echo "const String emailJsTemplateId = '${{ secrets.EMAILJS_TEMPLATE_ID }}';" >> lib/keys.dart
          echo "const String emailJsPublicKey = '${{ secrets.EMAILJS_PUBLIC_KEY }}';" >> lib/keys.dart
          echo "const String emailJsPrivateKey = '${{ secrets.EMAILJS_PRIVATE_KEY }}';" >> lib/keys.dart
          echo "const String firebaseAppCheckWebSiteKey = '${{ secrets.FIREBASE_APP_CHECK_WEB_SITE_KEY }}';" >> lib/keys.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Clean build
        run: flutter clean

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Create deploy marker
        run: |
          cat > build/web/deploy-info.txt <<EOF
          repo=${GITHUB_REPOSITORY}
          branch=${GITHUB_REF_NAME}
          commit=${GITHUB_SHA}
          run_id=${GITHUB_RUN_ID}
          run_number=${GITHUB_RUN_NUMBER}
          deployed_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Remove flutter_service_worker.js
        run: rm -f build/web/flutter_service_worker.js

      - name: Install FTP client (lftp)
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to Hostinger
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          REMOTE_DIR="${FTP_REMOTE_DIR:-.}"
          echo "Deploying to remote dir: ${REMOTE_DIR}"

          lftp -e "
            set net:timeout 20;
            set net:max-retries 2;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-max 10;
            set ftp:passive-mode true;
            set ftp:ssl-allow true;
            set ssl:verify-certificate no;
            set xfer:clobber on;
            set cmd:fail-exit yes;

            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            lcd build/web;
            cd $REMOTE_DIR;
            mirror -R --delete --verbose ./ ./;
            bye
          "
